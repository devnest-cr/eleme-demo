<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>商家从业资质</title>
  <link rel="stylesheet" href="node_modules/normalize.css/normalize.css">
  <link rel="stylesheet" href="css/global.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #f5f5f5;
      font-family: sans-serif;
    }
    .wrapper {
      padding: 4vw;
    }
    .page-title {
      font-size: 5vw;
      font-weight: bold;
      margin-bottom: 4vw;
      color: #333;
    }
    .cert-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4vw;
    }
    .cert-item {
      background: #fff;
      padding: 2vw;
      border-radius: 1.5vw;
      text-align: center;
    }
    .cert-item img {
      width: 100%;
      height: auto;
      border-radius: 1vw;
      object-fit: contain;
    }
  </style>
</head>
<body>
<div class="wrapper">
  <h1 class="page-title">商家从业资质</h1>
  <div class="cert-grid">
    <div class="cert-item">
      <img src="img/img/sj02.png" alt="营业执照">
    </div>
    <div class="cert-item">
      <img src="img/img/sj01.png" alt="食品经营许可证">
    </div>
  </div>
</div>
</body>
</html>
